name: Build Packages

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: 'Version override (optional)'
        required: false
        type: string
      upload_to_release:
        description: 'Upload packages to a GitHub Release'
        required: false
        type: boolean
        default: false
      release_tag:
        description: 'Release tag for manual asset upload (defaults to v<version>)'
        required: false
        type: string
  workflow_call:
    inputs:
      version:
        description: 'Version to build'
        required: false
        type: string
      upload_to_release:
        description: 'Upload to GitHub Release'
        required: false
        type: boolean
        default: false
      release_tag:
        description: 'Release tag for asset upload'
        required: false
        type: string

concurrency:
  group: build-packages-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/v') }}  # Don't cancel tag builds

permissions:
  contents: write

jobs:
  build-windows-packages:
    runs-on: windows-latest
    timeout-minutes: 60
    env:
      PYTHONUTF8: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install Dependencies
        run: uv sync --group dev

      - name: Install Inno Setup
        shell: powershell
        run: |
          $isccX86 = "C:/Program Files (x86)/Inno Setup 6/ISCC.exe"
          $isccX64 = "C:/Program Files/Inno Setup 6/ISCC.exe"
          $isccLocal = "$env:LOCALAPPDATA/Programs/Inno Setup 6/ISCC.exe"
          if ((Test-Path $isccX86) -or (Test-Path $isccX64) -or (Test-Path $isccLocal)) {
            Write-Host "Inno Setup already installed."
          } else {
            choco install innosetup --no-progress -y
          }

      - name: Verify Inno Setup Path
        run: >
          uv run python -c
          "import importlib.util,pathlib,sys;
          p=pathlib.Path('packaging/build.py').resolve();
          spec=importlib.util.spec_from_file_location('ankibuild', p);
          m=importlib.util.module_from_spec(spec);
          spec.loader.exec_module(m);
          iscc=m.resolve_iscc();
          print(iscc or 'ISCC_NOT_FOUND');
          sys.exit(0 if iscc else 1)"

      - name: Build Portable + Installer Packages
        run: uv run --with pyinstaller==6.19.0 python packaging/build.py --clean

      - name: Smoke Test Release Layout
        run: uv run python packaging/build.py --smoke-test-only

      - name: Read Version
        id: version
        shell: powershell
        run: |
          # Use input version if provided, otherwise read from pyproject.toml
          $inputVersion = "${{ inputs.version }}"
          if ($inputVersion) {
            $version = $inputVersion
          } else {
            $version = uv run python -c "import tomllib, pathlib; data = tomllib.loads(pathlib.Path('pyproject.toml').read_text(encoding='utf-8')); print(data['project']['version'])"
          }

          # Verify tag matches version if this is a tag push
          $gitRef = "${{ github.ref }}"
          if ($gitRef -match '^refs/tags/v(.+)$') {
            $tagVersion = $matches[1]
            if ($tagVersion -ne $version) {
              Write-Error "Tag version ($tagVersion) does not match pyproject.toml version ($version)"
              exit 1
            }
          }

          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "artifact_name=ankismart-windows-packages-$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Upload Windows Packages
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.version.outputs.artifact_name }}
          path: |
            dist/release/portable/*.zip
            dist/release/installer/*.exe
            build/ankismart/warn-ankismart.txt
          if-no-files-found: error

      - name: Publish Release Assets
        if: (startsWith(github.ref, 'refs/tags/v') || inputs.upload_to_release == true) && success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag || (startsWith(github.ref, 'refs/tags/') && github.ref_name || format('v{0}', steps.version.outputs.version)) }}
          files: |
            dist/release/portable/*.zip
            dist/release/installer/*.exe
          fail_on_unmatched_files: true
